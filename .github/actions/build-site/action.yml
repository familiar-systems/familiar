name: Build Site Image
description: Builds and (optionally) pushes the Astro site Docker image with optional GHA cache

inputs:
  registry:
    description: Container registry to tag images under
    required: false
    default: rg.fr-par.scw.cloud/loreweaver
  tags:
    description: |
      Multi-line list of image tags to produce. Prod passes `<registry>/site:<sha>`
      and `<registry>/site:latest`; preview passes a single `<registry>/site:pr-<N>-<shortsha>`.
    required: true
  site-url:
    description: Public canonical URL baked into the Astro build (SITE_URL ARG).
    required: true
  site-base-path:
    description: |
      Subpath prefix for Astro `base:`. Passed through as the SITE_BASE_PATH build-arg.
      Prod: "/". Preview: "/pr-<N>/". astro.config.mjs throws if unset, so this
      input is required and has no default.
    required: true
  public-app-url:
    description: |
      App-apex base URL (no trailing slash) baked into the Sign In CTA at build time.
      site.config.ts throws if PUBLIC_APP_URL is unset, so this input is required.
      Preview: https://app.preview.familiar.systems/pr-<N>. Prod: https://app.familiar.systems.
    required: true
  pnpm-version:
    description: pnpm version to install in the builder stage (PNPM_VERSION ARG).
    required: true
  push:
    description: Whether to push the built image to the registry.
    required: false
    default: "true"
  gha-cache:
    description: |
      Whether to use GHA cache as BuildKit's cache backend. GHA cache is
      cross-branch readable, so the production release path passes "false"
      to prevent a poisoned PR cache from seeding a main build. Preview
      builds keep the default "true" because cache poisoning of an
      ephemeral preview namespace is not load-bearing.
    required: false
    default: "true"

outputs:
  image-digest:
    description: Digest of the manifest pushed to the registry.
    value: ${{ steps.build.outputs.digest }}
  image-id:
    description: Local image ID (sha256) of the built image.
    value: ${{ steps.build.outputs.imageid }}

runs:
  using: composite
  steps:
    - id: build
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        file: apps/site/Dockerfile
        push: ${{ inputs.push }}
        build-args: |
          PNPM_VERSION=${{ inputs.pnpm-version }}
          SITE_URL=${{ inputs.site-url }}
          SITE_BASE_PATH=${{ inputs.site-base-path }}
          PUBLIC_APP_URL=${{ inputs.public-app-url }}
        tags: ${{ inputs.tags }}
        cache-from: ${{ inputs.gha-cache == 'true' && 'type=gha' || '' }}
        cache-to: ${{ inputs.gha-cache == 'true' && 'type=gha,mode=max' || '' }}
