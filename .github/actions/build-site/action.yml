name: Build Site Image
description: Builds and (optionally) pushes the Astro site Docker image with GHA cache

inputs:
  registry:
    description: Container registry to tag images under
    required: false
    default: rg.fr-par.scw.cloud/loreweaver
  tags:
    description: |
      Multi-line list of image tags to produce. Prod passes `<registry>/site:<sha>`
      and `<registry>/site:latest`; preview passes a single `<registry>/site:pr-<N>-<shortsha>`.
    required: true
  site-url:
    description: Public canonical URL baked into the Astro build (SITE_URL ARG).
    required: true
  site-base-path:
    description: |
      Subpath prefix for Astro `base:`. Passed through as the SITE_BASE_PATH build-arg.
      The site Dockerfile does not currently declare `ARG SITE_BASE_PATH`, so this is
      a no-op today; the input exists so the follow-up PR that wires the ARG does not
      have to change this composite's interface. Leave empty for root-served builds.
    required: false
    default: ""
  pnpm-version:
    description: pnpm version to install in the builder stage (PNPM_VERSION ARG).
    required: true
  push:
    description: Whether to push the built image to the registry.
    required: false
    default: "true"

outputs:
  image-digest:
    description: Digest of the manifest pushed to the registry.
    value: ${{ steps.build.outputs.digest }}
  image-id:
    description: Local image ID (sha256) of the built image.
    value: ${{ steps.build.outputs.imageid }}

runs:
  using: composite
  steps:
    - id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        file: apps/site/Dockerfile
        push: ${{ inputs.push }}
        # Empty `site-base-path` collapses to a blank line, which
        # docker/build-push-action's multi-line `build-args:` parser filters out.
        # Preserves byte-identical behavior with pre-refactor prod builds that
        # did not pass SITE_BASE_PATH at all.
        build-args: |
          PNPM_VERSION=${{ inputs.pnpm-version }}
          SITE_URL=${{ inputs.site-url }}
          ${{ inputs.site-base-path && format('SITE_BASE_PATH={0}', inputs.site-base-path) || '' }}
        tags: ${{ inputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
