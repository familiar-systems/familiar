name: Build Web Image
description: Builds and (optionally) pushes the Vite SPA Docker image with optional GHA cache

inputs:
  registry:
    description: Container registry to tag images under
    required: false
    default: rg.fr-par.scw.cloud/loreweaver
  tags:
    description: |
      Multi-line list of image tags to produce. Prod passes `<registry>/web:<sha>`
      and `<registry>/web:latest`; preview passes a single `<registry>/web:pr-<N>-<shortsha>`.
    required: true
  vite-hanko-api-url:
    description: |
      Hanko tenant URL baked into the SPA bundle (VITE_HANKO_API_URL ARG).
      Value is non-secret (appears in TLS SNI on every browser request).
    required: true
  vite-base-path:
    description: |
      Asset URL prefix for Vite (VITE_BASE_PATH ARG). Default `/` matches the
      prod layout (SPA at the root of the app apex). Preview overrides to `/pr-N/`.
    required: false
    default: /
  vite-site-url:
    description: |
      Marketing-apex origin the SPA links out to (VITE_SITE_URL ARG). The
      privacy-policy link on the login page is built off this. Preview
      includes the per-PR prefix because the marketing site itself is
      path-prefixed in preview.
    required: true
  pnpm-version:
    description: |
      pnpm version to install in the builder stage (PNPM_VERSION ARG).
      Source of truth is `mise.toml` (with `mise.lock` pinning the exact
      patch); CI resolves this via `mise current 'npm:pnpm'`.
    required: true
  push:
    description: Whether to push the built image to the registry.
    required: false
    default: "true"
  gha-cache:
    description: |
      Whether to use GHA cache as BuildKit's cache backend. GHA cache is
      cross-branch readable, so the production release path passes "false"
      to prevent a poisoned PR cache from seeding a main build. Preview
      builds keep the default "true" because cache poisoning of an
      ephemeral preview namespace is not load-bearing.
    required: false
    default: "true"

outputs:
  image-digest:
    description: Digest of the manifest pushed to the registry.
    value: ${{ steps.build.outputs.digest }}
  image-id:
    description: Local image ID (sha256) of the built image.
    value: ${{ steps.build.outputs.imageid }}

runs:
  using: composite
  steps:
    - id: build
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: .
        file: apps/web/Dockerfile
        push: ${{ inputs.push }}
        build-args: |
          PNPM_VERSION=${{ inputs.pnpm-version }}
          VITE_HANKO_API_URL=${{ inputs.vite-hanko-api-url }}
          VITE_BASE_PATH=${{ inputs.vite-base-path }}
          VITE_SITE_URL=${{ inputs.vite-site-url }}
        tags: ${{ inputs.tags }}
        cache-from: ${{ inputs.gha-cache == 'true' && 'type=gha' || '' }}
        cache-to: ${{ inputs.gha-cache == 'true' && 'type=gha,mode=max' || '' }}
