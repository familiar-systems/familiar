name: Extract tool versions from mise
description: Reads tool versions from mise.toml for use in CI setup steps

outputs:
  node:
    description: Node.js version
    value: ${{ steps.parse.outputs.node }}
  pnpm:
    description: pnpm version
    value: ${{ steps.parse.outputs.pnpm }}
  rust:
    description: Rust toolchain version
    value: ${{ steps.parse.outputs.rust }}
  python:
    description: Python version
    value: ${{ steps.parse.outputs.python }}

runs:
  using: composite
  steps:
    - id: parse
      shell: bash
      run: ${{ github.action_path }}/extract.sh >> "$GITHUB_OUTPUT"
