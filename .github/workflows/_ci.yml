name: CI (reusable)

# Reusable CI body. Called by:
#   - ci_cd_preview.yml on pull_request (alongside preview-deploy)
#   - ci_cd_main.yml    on push to main (before prod-deploy)
#
# This file MUST stay free of `secrets.*` references so it can be invoked
# from any context, including Dependabot PRs whose secret namespace is
# intentionally empty.

on:
  workflow_call:

permissions:
  actions: read
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── TypeScript ──────────────────────────────────────────
  ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "node npm:pnpm"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: Resolve tool versions
        id: versions
        shell: bash
        run: |
          {
            echo "node=$(mise current node)"
            echo "pnpm=$(mise current 'npm:pnpm')"
          } >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ steps.versions.outputs.pnpm }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ steps.versions.outputs.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: format
        run: pnpm format:check

      - name: lint
        run: pnpm lint

      - name: typecheck
        run: pnpm typecheck

      - name: build
        run: pnpm build:web

      - name: test
        run: pnpm test

  # ── Rust ────────────────────────────────────────────────
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "rust"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: Resolve rust toolchain
        id: versions
        shell: bash
        run: echo "rust=$(mise current rust)" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-04-25
        with:
          toolchain: ${{ steps.versions.outputs.rust }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: rust-build
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: format
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --workspace -- -D warnings

      - name: test
        run: cargo test --workspace

  # ── Generated types ─────────────────────────────────────
  generated-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "rust node npm:pnpm"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: Resolve tool versions
        id: versions
        shell: bash
        run: |
          {
            echo "node=$(mise current node)"
            echo "pnpm=$(mise current 'npm:pnpm')"
            echo "rust=$(mise current rust)"
          } >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-04-25
        with:
          toolchain: ${{ steps.versions.outputs.rust }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: rust-build
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ steps.versions.outputs.pnpm }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ steps.versions.outputs.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check generated types are fresh
        run: |
          rm -rf packages/types-app/src/generated packages/types-campaign/src/generated
          cargo test --workspace
          pnpm exec oxfmt packages/types-app/src/generated packages/types-campaign/src/generated
          git diff --exit-code -- packages/types-app/src/generated packages/types-campaign/src/generated

  # ── Python ──────────────────────────────────────────────
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: [whisperx]
    defaults:
      run:
        working-directory: workers/${{ matrix.worker }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "uv"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: Resolve uv version
        id: versions
        shell: bash
        run: echo "uv=$(mise current uv)" >> "$GITHUB_OUTPUT"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ steps.versions.outputs.uv }}
          enable-cache: true
          cache-dependency-glob: "workers/*/uv.lock"

      - name: sync
        run: uv sync --frozen

      - name: format
        run: uv run ruff format --check .

      - name: lint
        run: uv run ruff check .

      - name: typecheck
        run: uv run basedpyright

      - name: test
        run: uv run pytest

  # ── Infra (Pulumi Python + workflow YAML) ──────────────
  infra:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/pulumi-cloud
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "uv actionlint zizmor"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: Resolve uv version
        id: versions
        shell: bash
        run: echo "uv=$(mise current uv)" >> "$GITHUB_OUTPUT"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ steps.versions.outputs.uv }}
          enable-cache: true
          cache-dependency-glob: "infra/pulumi-cloud/uv.lock"

      - name: sync
        run: uv sync --frozen

      - name: format
        run: uv run ruff format --check .

      - name: lint
        run: uv run ruff check .

      - name: typecheck
        run: uv run basedpyright

      - name: actionlint
        working-directory: ${{ github.workspace }}
        run: actionlint

      - name: zizmor
        working-directory: ${{ github.workspace }}
        # Default persona; auditor persona is louder and can come later.
        run: zizmor .github/workflows/ .github/actions/

  # ── Dependency review (PR only) ─────────────────────────
  # Catches PRs that introduce known-vulnerable npm/cargo/pip deps. The
  # underlying API is free on public repos and gated behind GHAS on private
  # repos, so we skip while private. Flips on automatically at public cutover.
  #
  # `github.event_name` inside a reusable workflow reflects the *caller's*
  # trigger event, not 'workflow_call' - so this correctly fires only when
  # _ci.yml is called from a pull_request-triggered caller (ci.yml), and
  # is skipped under push-triggered callers (cd.yml on main).
  dep-review:
    if: github.event_name == 'pull_request' && !github.event.repository.private
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate

  # ── Gate ────────────────────────────────────────────────
  ci-ok:
    if: always()
    needs: [ts, rust, python, infra, generated-types, dep-review]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more CI jobs were cancelled"
            exit 1
          fi
          echo "All CI checks passed"
