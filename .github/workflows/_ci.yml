name: CI (reusable)

# Reusable CI body. Called by:
#   - ci_cd_preview.yml on pull_request (alongside preview-deploy)
#   - ci_cd_main.yml    on push to main (before prod-deploy)
#
# This file MUST stay free of `secrets.*` references so it can be invoked
# from any context, including Dependabot PRs whose secret namespace is
# intentionally empty.

on:
  workflow_call:

permissions:
  actions: read
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── TypeScript ──────────────────────────────────────────
  ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "node npm:pnpm"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: Resolve tool versions
        id: versions
        shell: bash
        run: |
          {
            echo "node=$(mise current node)"
            echo "pnpm=$(mise current 'npm:pnpm')"
          } >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ steps.versions.outputs.pnpm }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ steps.versions.outputs.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: format
        run: pnpm format:check

      - name: lint
        run: pnpm lint

      - name: typecheck
        run: pnpm typecheck

      - name: build
        run: pnpm build:web

      - name: test
        run: pnpm test

  # ── Rust ────────────────────────────────────────────────
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Note: 'rust' is intentionally NOT in install_args. dtolnay/rust-toolchain
      # below is the sole Rust installer. Two installers race in $PATH and ship
      # different rustc commit hashes, which invalidates every dep crate's cargo
      # fingerprint on cache restore. `mise current rust` still works here because
      # it reads mise.toml regardless of whether rust is installed.
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "node npm:pnpm"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: Resolve tool versions
        id: versions
        shell: bash
        run: |
          {
            echo "node=$(mise current node)"
            echo "pnpm=$(mise current 'npm:pnpm')"
            echo "rust=$(mise current rust)"
          } >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-04-25
        with:
          toolchain: ${{ steps.versions.outputs.rust }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: rust-build
          save-if: ${{ github.ref == 'refs/heads/main' }}
          # Cache transitive dep artifacts too, not just direct workspace deps.
          # Cheap insurance for the proc-macro-heavy graph (sea-orm, ts-rs, utoipa).
          cache-all-crates: true

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ steps.versions.outputs.pnpm }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ steps.versions.outputs.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: format
        run: cargo fmt --check

      # --all-targets builds test/example units in Mode::Build (since tests must
      # link), which the test step below then reuses. Workspace crates use
      # Mode::Check via clippy-driver and don't share fingerprints with test,
      # but there are only 4 of them, so it's cheap.
      # Don't add a `cargo build` step before this: Build-mode artifacts have
      # different fingerprints from Check-mode, so it would not warm clippy.
      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      # ts-rs emits its `.ts` bindings via `#[cfg(test)] export_bindings_<TypeName>`
      # functions, so cargo test is what produces the ts-rs side of the
      # generated/ tree. The pre-clean ensures any types deleted in this PR
      # surface as a diff in the verify step below rather than lingering as
      # stale .ts files. Decoupling regen from cargo test would mean a
      # dedicated emit-types binary; tracked as a follow-up.
      - name: test
        run: |
          rm -rf \
            packages/types-app/src/generated \
            packages/types-campaign/src/generated \
            packages/types-app/openapi \
            packages/types-app/src/openapi
          cargo test --workspace --locked

      # Known suboptimality: `cargo run --bin emit-openapi` re-resolves and
      # re-links the platform crate even though the test step above already
      # compiled it, costing ~10-30s per CI run. The clean fix is to
      # `cargo build --bin emit-openapi --locked` inside the test step
      # (warm dep cache, just relinks) and exec ./target/debug/emit-openapi
      # here. Deferred - not load-bearing, revisit when CI wall-time becomes
      # an actual problem.
      - name: emit OpenAPI spec and typed paths interface
        run: |
          mkdir -p packages/types-app/openapi
          cargo run -p familiar-systems-platform --bin emit-openapi --locked \
            > packages/types-app/openapi/platform.json
          pnpm --filter @familiar-systems/openapi-codegen run generate:platform

      - name: verify regenerated artifacts match committed
        run: |
          pnpm --filter @familiar-systems/types-app --filter @familiar-systems/types-campaign run format
          git diff --exit-code -- \
            packages/types-app/src/generated \
            packages/types-campaign/src/generated \
            packages/types-app/openapi \
            packages/types-app/src/openapi

  # ── Python ──────────────────────────────────────────────
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: [whisperx]
    defaults:
      run:
        working-directory: workers/${{ matrix.worker }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "uv"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: Resolve uv version
        id: versions
        shell: bash
        run: echo "uv=$(mise current uv)" >> "$GITHUB_OUTPUT"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ steps.versions.outputs.uv }}
          enable-cache: true
          cache-dependency-glob: "workers/*/uv.lock"

      - name: sync
        run: uv sync --frozen

      - name: format
        run: uv run ruff format --check .

      - name: lint
        run: uv run ruff check .

      - name: typecheck
        run: uv run basedpyright

      - name: test
        run: uv run pytest

  # ── Infra (Pulumi Python + workflow YAML) ──────────────
  infra:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/pulumi-cloud
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "uv actionlint zizmor"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: Resolve uv version
        id: versions
        shell: bash
        run: echo "uv=$(mise current uv)" >> "$GITHUB_OUTPUT"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ steps.versions.outputs.uv }}
          enable-cache: true
          cache-dependency-glob: "infra/pulumi-cloud/uv.lock"

      - name: sync
        run: uv sync --frozen

      - name: format
        run: uv run ruff format --check .

      - name: lint
        run: uv run ruff check .

      - name: typecheck
        run: uv run basedpyright

      - name: actionlint
        working-directory: ${{ github.workspace }}
        run: actionlint

      - name: zizmor
        working-directory: ${{ github.workspace }}
        # Default persona; auditor persona is louder and can come later.
        run: zizmor .github/workflows/ .github/actions/

  # ── Dependency review (PR only) ─────────────────────────
  # Catches PRs that introduce known-vulnerable npm/cargo/pip deps. The
  # underlying API is free on public repos and gated behind GHAS on private
  # repos, so we skip while private. Flips on automatically at public cutover.
  #
  # `github.event_name` inside a reusable workflow reflects the *caller's*
  # trigger event, not 'workflow_call' - so this correctly fires only when
  # _ci.yml is called from a pull_request-triggered caller (ci.yml), and
  # is skipped under push-triggered callers (cd.yml on main).
  dep-review:
    if: github.event_name == 'pull_request' && !github.event.repository.private
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate

  # ── Gate ────────────────────────────────────────────────
  ci-ok:
    if: always()
    needs: [ts, rust, python, infra, dep-review]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more CI jobs were cancelled"
            exit 1
          fi
          echo "All CI checks passed"
