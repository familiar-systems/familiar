name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── TypeScript ──────────────────────────────────────────
  ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          install_args: "node npm:pnpm"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: Resolve tool versions
        id: versions
        shell: bash
        run: |
          {
            echo "node=$(mise current node)"
            echo "pnpm=$(mise current 'npm:pnpm')"
          } >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ steps.versions.outputs.pnpm }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.versions.outputs.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: format
        run: pnpm format:check

      - name: lint
        run: pnpm lint

      - name: typecheck
        run: pnpm typecheck

      - name: build
        run: pnpm build:web

      - name: test
        run: pnpm test

  # ── Rust ────────────────────────────────────────────────
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          install_args: "rust"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: Resolve rust toolchain
        id: versions
        shell: bash
        run: echo "rust=$(mise current rust)" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.versions.outputs.rust }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: format
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --workspace -- -D warnings

      - name: test
        run: cargo test --workspace

  # ── Generated types ─────────────────────────────────────
  generated-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          install_args: "rust node npm:pnpm"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: Resolve tool versions
        id: versions
        shell: bash
        run: |
          {
            echo "node=$(mise current node)"
            echo "pnpm=$(mise current 'npm:pnpm')"
            echo "rust=$(mise current rust)"
          } >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.versions.outputs.rust }}

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ steps.versions.outputs.pnpm }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.versions.outputs.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check generated types are fresh
        run: |
          rm -rf packages/types-app/src/generated packages/types-campaign/src/generated
          cargo test --workspace
          pnpm exec oxfmt packages/types-app/src/generated packages/types-campaign/src/generated
          git diff --exit-code -- packages/types-app/src/generated packages/types-campaign/src/generated

  # ── Python ──────────────────────────────────────────────
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: [whisperx]
    defaults:
      run:
        working-directory: workers/${{ matrix.worker }}
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          install_args: "uv"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: Resolve uv version
        id: versions
        shell: bash
        run: echo "uv=$(mise current uv)" >> "$GITHUB_OUTPUT"

      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ steps.versions.outputs.uv }}
          enable-cache: true
          cache-dependency-glob: "workers/*/uv.lock"

      - name: sync
        run: uv sync --frozen

      - name: format
        run: uv run ruff format --check .

      - name: lint
        run: uv run ruff check .

      - name: typecheck
        run: uv run basedpyright

      - name: test
        run: uv run pytest

  # ── Gate ────────────────────────────────────────────────
  ci-ok:
    if: always()
    needs: [ts, rust, python, generated-types]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more CI jobs were cancelled"
            exit 1
          fi
          echo "All CI checks passed"

  deploy-site:
    needs: [ci-ok]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/cd.yml
    secrets: inherit
