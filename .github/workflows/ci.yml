name: CI

# PR-side caller for the reusable CI workflow. Runs the full lint/format/
# typecheck/test gauntlet on every pull request to main. Pushes to main
# itself are validated by cd.yml, which calls the same _ci.yml before
# deploying - so each commit goes through CI exactly once, not twice.

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/_ci.yml
