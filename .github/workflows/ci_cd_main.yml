name: CI + Deploy

# Push-to-main pipeline: CI -> build images -> apply k8s manifests.
#
# Three sequential phases, all in one workflow:
#   1. ci        - reusable _ci.yml (lint, test, typecheck, k8s validation)
#   2. build     - per-target image build+push (path-filtered matrix)
#   3. apply-k8s - resolve image tags, sync secrets, kustomize apply
#
# The single-workflow design eliminates the race condition between image
# builds and manifest applies that existed when k8s.yml was separate.
#
# Counterpart: ci_cd_preview.yml runs the same CI on PRs and deploys to
# the preview environment.

on:
  push:
    branches: [main]
  # Manual trigger: used by infra/pulumi-cloud/scripts/rotate_scw_key.py
  # to verify a freshly-rotated SCW_* secret pair end-to-end without
  # requiring a no-op commit. No inputs; runs against the configured ref.
  workflow_dispatch:
  # Synchronous entry point preserved for any future caller. The
  # `required: true` mapping is the contract: adding a new `secrets.*`
  # reference in this workflow's body without also adding it here fails
  # at YAML-parse time, which is the point.
  workflow_call:
    secrets:
      SCW_ACCESS_KEY:
        required: true
      SCW_SECRET_KEY:
        required: true
      SCW_DEFAULT_PROJECT_ID:
        required: true
      SCW_DEFAULT_ORGANIZATION_ID:
        required: true

permissions:
  actions: read
  contents: read

env:
  REGISTRY: rg.fr-par.scw.cloud/loreweaver
  DO_NOT_TRACK: 1
  # Public Hanko tenant URL for the production environment.
  # Canonical source: infra/pulumi-cloud/config.py::HANKO_API_URL_PROD.
  # Pulumi injects it into the platform deployment's runtime env; here we
  # bake it into the web image at build time via VITE_HANKO_API_URL.
  # GHA cannot import Python natively; this is a documented derived copy.
  # Drift is visible in code review and breaks prod sign-in loudly. The
  # value is non-secret (it appears in TLS SNI on every browser request).
  HANKO_API_URL_PROD: "https://auth.familiar.systems"

jobs:
  ci:
    uses: ./.github/workflows/_ci.yml

  build:
    needs: ci
    runs-on: ubuntu-latest
    env:
      DEPLOY_SHA: ${{ github.sha }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: site
            paths: |
              apps/site/**
              .github/workflows/ci_cd_main.yml
              .github/actions/**
          - target: web
            paths: |
              apps/web/**
              packages/editor/**
              packages/types-app/**
              packages/types-campaign/**
              tooling/tsconfig/**
              package.json
              pnpm-lock.yaml
              pnpm-workspace.yaml
              .github/workflows/ci_cd_main.yml
              .github/actions/**
          - target: platform
            paths: |
              apps/platform/**
              crates/app-shared/**
              crates/fs-id/**
              crates/fs-id-macros/**
              Cargo.toml
              Cargo.lock
              .github/workflows/ci_cd_main.yml
              .github/actions/**
          - target: campaign
            paths: |
              apps/campaign/**
              crates/campaign-shared/**
              crates/app-shared/**
              crates/fs-id/**
              crates/fs-id-macros/**
              Cargo.toml
              Cargo.lock
              .github/workflows/ci_cd_main.yml
              .github/actions/**
    concurrency:
      group: deploy-${{ matrix.target }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "npm:pnpm"
          # Production release path opts out of GHA cache because the cache
          # is cross-branch readable and a poisoned PR cache could seed a
          # main build. Preview builds keep caching for speed.
          cache: false

      - name: Resolve pnpm version
        id: versions
        shell: bash
        run: echo "pnpm=$(mise current 'npm:pnpm')" >> "$GITHUB_OUTPUT"

      - name: Check if files for this target or CI changed
        id: changes
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: ${{ matrix.paths }}

      - uses: ./.github/actions/setup-scw
        if: steps.changes.outputs.any_changed == 'true'
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
          registry-login: true

      - name: Set up Docker Buildx
        if: steps.changes.outputs.any_changed == 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push site
        if: steps.changes.outputs.any_changed == 'true' && matrix.target == 'site'
        uses: ./.github/actions/build-site
        with:
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.target }}:${{ env.DEPLOY_SHA }}
            ${{ env.REGISTRY }}/${{ matrix.target }}:latest
          site-url: https://familiar.systems
          site-base-path: /
          public-app-url: https://app.familiar.systems
          pnpm-version: ${{ steps.versions.outputs.pnpm }}
          gha-cache: "false"

      - name: Build and push web
        if: steps.changes.outputs.any_changed == 'true' && matrix.target == 'web'
        uses: ./.github/actions/build-web
        with:
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.target }}:${{ env.DEPLOY_SHA }}
            ${{ env.REGISTRY }}/${{ matrix.target }}:latest
          vite-hanko-api-url: ${{ env.HANKO_API_URL_PROD }}
          vite-site-url: https://familiar.systems
          pnpm-version: ${{ steps.versions.outputs.pnpm }}
          gha-cache: "false"

      - name: Build and push platform
        if: steps.changes.outputs.any_changed == 'true' && matrix.target == 'platform'
        uses: ./.github/actions/build-platform
        with:
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.target }}:${{ env.DEPLOY_SHA }}
            ${{ env.REGISTRY }}/${{ matrix.target }}:latest
          gha-cache: "false"

      - name: Build and push campaign
        if: steps.changes.outputs.any_changed == 'true' && matrix.target == 'campaign'
        uses: ./.github/actions/build-campaign
        with:
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.target }}:${{ env.DEPLOY_SHA }}
            ${{ env.REGISTRY }}/${{ matrix.target }}:latest
          gha-cache: "false"

      - name: Clean up old images
        if: steps.changes.outputs.any_changed == 'true'
        run: |
          IMAGE_ID="$(scw registry image list name=${{ matrix.target }} -o json | jq -r '.[0].id')"
          if [ -z "$IMAGE_ID" ] || [ "$IMAGE_ID" = "null" ]; then
            echo "No ${{ matrix.target }} image found, skipping cleanup"
            exit 0
          fi

          CUTOFF="$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)"

          scw registry tag list image-id="$IMAGE_ID" -o json \
          | jq -r --arg cutoff "$CUTOFF" \
              '.[] | select(.name != "latest" and (.name | startswith("pr-") | not) and .created_at < $cutoff) | .id' \
          | while read -r TAG_ID; do
              echo "Deleting old tag $TAG_ID"
              scw registry tag delete "$TAG_ID"
            done

  # ── Declarative k8s apply ─────────────────────────────
  # Runs after CI and image builds. Resolves the correct image tag per
  # target (SHA if we built one, currently-deployed tag if we didn't),
  # then applies the full kustomize overlay in one shot. This replaces
  # the old kubectl-set-image approach and the separate k8s.yml workflow,
  # eliminating the race between manifest apply and image update.
  apply-k8s:
    needs: [ci, build]
    runs-on: ubuntu-latest
    concurrency:
      group: apply-k8s-prod
      cancel-in-progress: false
    env:
      DEPLOY_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: kubectl
          cache: false

      - uses: ./.github/actions/setup-scw
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
          registry-login: true

      - uses: ./.github/actions/fetch-scw-secret
        id: kubeconfig
        with:
          secret-name: k3s-kubeconfig

      - name: Resolve image tags
        id: tags
        env:
          KUBECONFIG_CONTENT: ${{ steps.kubeconfig.outputs.value }}
        run: |
          echo "$KUBECONFIG_CONTENT" > /tmp/kubeconfig.yaml

          resolve_tag() {
            local target="$1"
            if docker manifest inspect "$REGISTRY/$target:$DEPLOY_SHA" >/dev/null 2>&1; then
              echo "$DEPLOY_SHA"
            else
              local current
              current=$(kubectl get deployment/"$target" \
                --kubeconfig /tmp/kubeconfig.yaml --namespace default \
                -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)
              local tag="${current##*:}"
              if [ -z "$tag" ] || [ "$tag" = "$current" ]; then
                echo "latest"
              else
                echo "$tag"
              fi
            fi
          }

          for target in site web platform campaign; do
            TAG=$(resolve_tag "$target")
            echo "${target}_tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "$target -> $TAG"
          done

      - name: Sync secrets and apply manifests
        env:
          KUBECONFIG_CONTENT: ${{ steps.kubeconfig.outputs.value }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SITE_TAG: ${{ steps.tags.outputs.site_tag }}
          WEB_TAG: ${{ steps.tags.outputs.web_tag }}
          PLATFORM_TAG: ${{ steps.tags.outputs.platform_tag }}
          CAMPAIGN_TAG: ${{ steps.tags.outputs.campaign_tag }}
        run: |
          echo "$KUBECONFIG_CONTENT" > /tmp/kubeconfig.yaml
          export KUBECONFIG=/tmp/kubeconfig.yaml

          infra/k8s/scripts/sync-prod-secrets.sh

          cat >> infra/k8s/overlays/prod/kustomization.yaml <<EOF

          images:
            - name: rg.fr-par.scw.cloud/loreweaver/site
              newTag: "${SITE_TAG}"
            - name: rg.fr-par.scw.cloud/loreweaver/web
              newTag: "${WEB_TAG}"
            - name: rg.fr-par.scw.cloud/loreweaver/platform
              newTag: "${PLATFORM_TAG}"
            - name: rg.fr-par.scw.cloud/loreweaver/campaign
              newTag: "${CAMPAIGN_TAG}"
          EOF

          echo "==> Kustomize overlay with image overrides:"
          cat infra/k8s/overlays/prod/kustomization.yaml

          echo "==> Dry run..."
          kubectl kustomize infra/k8s/overlays/prod \
            | kubectl apply --server-side --force-conflicts --dry-run=server -f -

          echo "==> Applying..."
          kubectl kustomize infra/k8s/overlays/prod \
            | kubectl apply --server-side --force-conflicts -f -

          for deploy in site web platform campaign; do
            if kubectl get "deployment/${deploy}" --namespace default >/dev/null 2>&1; then
              kubectl rollout status "deployment/${deploy}" --namespace default --timeout=120s
            else
              echo "Deployment/${deploy} not yet provisioned, skipping rollout wait"
            fi
          done

          rm /tmp/kubeconfig.yaml
