name: CI + Preview

# PR-side pipeline: runs CI (via the reusable _ci.yml) and, in parallel,
# builds + deploys a preview environment under preview-pr-${PR_NUMBER}.
# CI and preview-deploy run independently. The deploy is not gated on CI
# passing because the failure modes CI catches (lint, types, tests) are
# not the same failure modes that break a running preview - those are
# caught by the preview's own docker build step. See the discussion in
# /home/mg/.claude/plans/can-you-explain-why-enchanted-goose.md and the
# branch's commit history for the rationale. Add `needs: ci` to `build`
# below if that calculus ever changes.
#
# Counterpart: ci_cd_main.yml runs the same CI on push-to-main and
# deploys to production. Each commit goes through CI exactly once -
# either via this workflow on the PR, or via ci_cd_main.yml on push.

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  actions: read
  contents: read

# One concurrency lock per ref serializes CI + preview-deploy together.
# A new push to a PR cancels in-flight CI and preview from the previous
# push, so reviewers always see the latest commit's preview, not a
# half-finished one from two pushes ago.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: rg.fr-par.scw.cloud/loreweaver
  DO_NOT_TRACK: 1
  # Public Hanko tenant URL for the contributor preview environment.
  # Canonical source: mise.toml [env].HANKO_API_URL_DEV. A single dev URL
  # feeds both `mise run dev:platform` and `mise run dev:web` via mise's
  # tera templating. GHA cannot import TOML or Python natively; this is a
  # documented derived copy. Drift is visible in code review and breaks
  # PR-preview signin loudly. The value is non-secret (it appears in TLS
  # SNI on every browser request).
  HANKO_API_URL_DEV: "https://auth.preview.familiar.systems"

jobs:
  ci:
    uses: ./.github/workflows/_ci.yml

  # Path-change detection. Replaces the old workflow-level `paths:` filter
  # on deploy-preview.yml. We can't use that filter here because CI must
  # run on every PR regardless of which files changed - so the gating
  # moves into a small dedicated job whose output drives the build/deploy
  # `if:` conditions.
  paths:
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changes.outputs.any_changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Fetch full history so tj-actions/changed-files can compute the
          # PR diff locally without an extra remote fetch. With the default
          # shallow clone (fetch-depth: 1), the action would try to deepen
          # the clone to reach the PR base on origin/main - and fail,
          # because we deliberately set persist-credentials: false (the
          # token isn't in .git/config to authenticate the fetch). Trading
          # a slightly larger checkout for keeping the credential
          # hardening intact.
          fetch-depth: 0
          persist-credentials: false

      - name: Detect preview-relevant changes
        id: changes
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            apps/site/**
            apps/web/**
            apps/platform/**
            packages/editor/**
            packages/types-app/**
            packages/types-campaign/**
            tooling/tsconfig/**
            crates/app-shared/**
            Cargo.toml
            Cargo.lock
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            infra/k8s/preview/**
            .github/actions/**
            .github/workflows/ci_cd_preview.yml

  # Fork-PR + Dependabot guard. Preview deploys consume registry pushes
  # and cluster credentials, so they only run for PRs from this repository
  # (which only people with write access can create). Fork PRs evaluate
  # this condition to false and skip without executing any step. Combined
  # with the repo-level "Require approval for all outside collaborators"
  # setting, even an approved fork PR's CI cannot trigger a deploy.
  # Dependabot is excluded too: its workflow context can't read the SCW_*
  # Actions secrets (they live in a separate Dependabot secret namespace,
  # which is intentionally empty), so any attempt to start a deploy fails
  # at workflow-startup validation. Skipping cleanly avoids the noise.
  build:
    needs: paths
    if: >
      needs.paths.outputs.any_changed == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [site, web, platform]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "npm:pnpm"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: Resolve pnpm version
        id: versions
        shell: bash
        run: echo "pnpm=$(mise current 'npm:pnpm')" >> "$GITHUB_OUTPUT"

      - name: Compute image tag
        id: meta
        run: |
          SHA="${GITHUB_SHA:0:7}"
          echo "tag=${{ env.REGISTRY }}/${{ matrix.target }}:pr-${{ github.event.pull_request.number }}-${SHA}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-scw
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
          registry-login: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push site
        if: matrix.target == 'site'
        uses: ./.github/actions/build-site
        with:
          tags: ${{ steps.meta.outputs.tag }}
          site-url: https://preview.familiar.systems
          site-base-path: /pr-${{ github.event.pull_request.number }}/
          # SPA's app apex includes the per-PR path prefix; appending /login
          # at build time yields https://app.preview.familiar.systems/pr-N/login.
          public-app-url: https://app.preview.familiar.systems/pr-${{ github.event.pull_request.number }}
          pnpm-version: ${{ steps.versions.outputs.pnpm }}

      - name: Build and push web
        if: matrix.target == 'web'
        uses: ./.github/actions/build-web
        with:
          tags: ${{ steps.meta.outputs.tag }}
          vite-hanko-api-url: ${{ env.HANKO_API_URL_DEV }}
          vite-base-path: /pr-${{ github.event.pull_request.number }}/

      - name: Build and push platform
        if: matrix.target == 'platform'
        uses: ./.github/actions/build-platform
        with:
          tags: ${{ steps.meta.outputs.tag }}

  deploy-pr-preview:
    needs: [paths, build]
    if: >
      needs.paths.outputs.any_changed == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-scw
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}

      - uses: ./.github/actions/fetch-scw-secret
        id: kubeconfig
        with:
          secret-name: k3s-kubeconfig

      - name: Deploy PR preview
        env:
          KUBECONFIG_CONTENT: ${{ steps.kubeconfig.outputs.value }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REGISTRY: ${{ env.REGISTRY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          HANKO_API_URL_DEV: ${{ env.HANKO_API_URL_DEV }}
        run: |
          echo "$KUBECONFIG_CONTENT" > /tmp/kubeconfig.yaml
          export KUBECONFIG=/tmp/kubeconfig.yaml

          SHA="${GITHUB_SHA:0:7}"

          # Template variables consumed by envsubst in infra/k8s/preview/*.yaml.
          # Every PR shares two apex hosts - preview.familiar.systems (marketing)
          # and app.preview.familiar.systems (SPA + API + campaign). The PR
          # number appears only in the path prefix, not in the host. Ingress
          # manifests reference ${PR_NUMBER} to build path + StripPrefix values.
          export NAMESPACE="preview-pr-${PR_NUMBER}"
          export PR_NUMBER="${PR_NUMBER}"

          # Image tags - deterministic from PR number + short SHA
          export SITE_IMAGE="${REGISTRY}/site:pr-${PR_NUMBER}-${SHA}"
          export WEB_IMAGE="${REGISTRY}/web:pr-${PR_NUMBER}-${SHA}"
          export PLATFORM_IMAGE="${REGISTRY}/platform:pr-${PR_NUMBER}-${SHA}"

          # Docker registry auth for imagePullSecret (scaleway-registry).
          # Each derived value is masked because it embeds SCW_SECRET_KEY
          # (DOCKER_AUTH = base64(nologin:KEY)). GitHub auto-masks raw
          # secrets.* values; anything we compute from a secret in shell
          # must be marked explicitly or it surfaces in logs on script
          # failure. Removed entirely once PR-Sec-6 lands and the
          # cluster-wide pull secret replaces this path.
          DOCKER_AUTH=$(printf 'nologin:%s' "$SCW_SECRET_KEY" | base64 -w0)
          echo "::add-mask::$DOCKER_AUTH"
          DOCKERCONFIG_JSON=$(printf '{"auths":{"%s":{"auth":"%s"}}}' "$REGISTRY" "$DOCKER_AUTH")
          echo "::add-mask::$DOCKERCONFIG_JSON"
          DOCKERCONFIG_B64=$(printf '%s' "$DOCKERCONFIG_JSON" | base64 -w0)
          echo "::add-mask::$DOCKERCONFIG_B64"
          export DOCKERCONFIG_B64

          # Apply manifests in dependency order (namespace must exist before children)
          for manifest in namespace registry-pull-secret \
                          platform-pv platform-pvc \
                          site-deployment site-service site-ingress \
                          web-deployment web-service web-ingress \
                          platform-deployment platform-service platform-ingress; do
            envsubst < "infra/k8s/preview/${manifest}.yaml" | kubectl apply -f -
          done

          kubectl -n "$NAMESPACE" rollout status deployment/site --timeout=180s
          kubectl -n "$NAMESPACE" rollout status deployment/web --timeout=180s
          kubectl -n "$NAMESPACE" rollout status deployment/platform --timeout=180s

          rm /tmp/kubeconfig.yaml

      - name: Comment PR URLs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const marketingRoot = `https://preview.familiar.systems/pr-${prNumber}`;
            const appRoot = `https://app.preview.familiar.systems/pr-${prNumber}`;

            const marker = '<!-- preview-urls -->';
            const body = [
              marker,
              'Preview deployed:',
              '',
              `Site: ${marketingRoot}/`,
              `App:  ${appRoot}/`,
              `API:  ${appRoot}/api/`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
