name: Cleanup Preview

# Runs on PR close (merged or unmerged). Intentionally has no `paths:` filter:
# for unmerged PRs whose head branch is deleted on close, GitHub Actions can
# no longer compute the PR's file diff (the head commit becomes unreachable),
# which causes `paths:`-filtered workflows to silently fail to trigger. This
# workflow must run for every closed PR regardless of what it touched.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      # Sparse checkout: the local composite actions (setup-scw,
      # fetch-scw-secret) and the cleanup Job manifest applied below.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            .github/actions
            infra/k8s/preview
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - uses: ./.github/actions/setup-scw
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}

      - uses: ./.github/actions/fetch-scw-secret
        id: kubeconfig
        with:
          secret-name: k3s-kubeconfig

      - name: Delete PR namespace, platform PV, and hostPath data
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          STEPS_KUBECONFIG_OUTPUTS_VALUE: ${{ steps.kubeconfig.outputs.value }}
        run: |
          echo "${STEPS_KUBECONFIG_OUTPUTS_VALUE}" > /tmp/kubeconfig.yaml
          export KUBECONFIG=/tmp/kubeconfig.yaml

          kubectl delete namespace "preview-pr-${PR_NUMBER}" --ignore-not-found
          # HostPath PVs with Retain reclaim policy are cluster-scoped and are
          # not garbage-collected when the namespace is deleted. Delete explicitly.
          kubectl delete pv "platform-pv-preview-pr-${PR_NUMBER}" --ignore-not-found=true

          # Wipe the node-side hostPath directory. Retain preserves the bytes
          # after the PV is gone, so a reopened PR would otherwise bind a new
          # PV on stale data. See platform-hostpath-cleanup-job.yaml for the
          # Job manifest + reasoning.
          export PR_NUMBER
          JOB_NAME="$(envsubst < infra/k8s/preview/platform-hostpath-cleanup-job.yaml \
            | kubectl create -f - -o jsonpath='{.metadata.name}')"
          echo "Created hostpath-cleanup Job ${JOB_NAME}; waiting for completion..."
          kubectl wait --for=condition=complete --timeout=120s \
            -n default "job/${JOB_NAME}"

          rm /tmp/kubeconfig.yaml

      - name: Clean up PR images from registry
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PREFIX="pr-${PR_NUMBER}-"

          for target in site web platform; do
            # Get the image ID for this target
            IMAGE_ID="$(scw registry image list name="${target}" -o json | jq -r '.[0].id')"
            if [ -z "$IMAGE_ID" ] || [ "$IMAGE_ID" = "null" ]; then
              echo "No ${target} image found in registry, skipping"
              continue
            fi

            # List all tags, filter locally for pr-N- prefix, delete each
            scw registry tag list image-id="$IMAGE_ID" -o json \
            | jq -r --arg prefix "$PREFIX" '.[] | select(.name | startswith($prefix)) | .id' \
            | while read -r TAG_ID; do
                echo "Deleting tag $TAG_ID (${target})"
                scw registry tag delete "$TAG_ID"
              done
          done
