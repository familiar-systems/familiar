name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - apps/site/**
      - .github/workflows/deploy-preview.yml

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  REGISTRY: rg.fr-par.scw.cloud/loreweaver
  IMAGE_NAME: site
  DO_NOT_TRACK: 1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          install_args: "npm:pnpm"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: Resolve pnpm version
        id: versions
        shell: bash
        run: echo "pnpm=$(mise current 'npm:pnpm')" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: meta
        run: |
          SHA="${GITHUB_SHA:0:7}"
          echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}-$SHA" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-scw
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
          registry-login: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/site/Dockerfile
          push: true
          build-args: |
            SITE_URL=https://preview.loreweaver.no
            PNPM_VERSION=${{ steps.versions.outputs.pnpm }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-pr-preview:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-scw
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}

      - uses: ./.github/actions/fetch-scw-secret
        id: kubeconfig
        with:
          secret-name: k3s-kubeconfig

      - name: Deploy PR preview
        env:
          KUBECONFIG_CONTENT: ${{ steps.kubeconfig.outputs.value }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          REGISTRY: ${{ env.REGISTRY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: |
          echo "$KUBECONFIG_CONTENT" > /tmp/kubeconfig.yaml
          export KUBECONFIG=/tmp/kubeconfig.yaml

          # Template variables consumed by envsubst in infra/k8s/preview/*.yaml
          export NAMESPACE="preview-pr-${PR_NUMBER}"
          export PR_HOST="pr-${PR_NUMBER}.preview.loreweaver.no"
          # Docker registry auth for imagePullSecret (scaleway-registry)
          DOCKER_AUTH=$(printf 'nologin:%s' "$SCW_SECRET_KEY" | base64 -w0)
          DOCKERCONFIG_JSON=$(printf '{"auths":{"%s":{"auth":"%s"}}}' "$REGISTRY" "$DOCKER_AUTH")
          DOCKERCONFIG_B64=$(printf '%s' "$DOCKERCONFIG_JSON" | base64 -w0)
          export DOCKERCONFIG_B64

          # Apply manifests in dependency order (namespace must exist before children)
          for manifest in namespace registry-pull-secret deployment service ingress; do
            envsubst < "infra/k8s/preview/${manifest}.yaml" | kubectl apply -f -
          done

          kubectl rollout status deployment/site \
            --namespace "$NAMESPACE" \
            --timeout=120s

          rm /tmp/kubeconfig.yaml

      - name: Comment PR URL
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const url = `https://pr-${prNumber}.preview.loreweaver.no`;
            const body = `Preview deployed: ${url}`;

            // Update or create comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.startsWith('Preview deployed:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
