name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, closed]
    paths:
      - apps/site/**
      - .github/workflows/deploy-preview.yml

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  REGISTRY: rg.fr-par.scw.cloud/loreweaver
  IMAGE_NAME: site
  DO_NOT_TRACK: 1
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  build-and-push:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute image tags
        id: meta
        run: |
          SHA="${GITHUB_SHA:0:7}"
          echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}-$SHA" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-scw
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
          registry-login: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/site/Dockerfile
          push: true
          build-args: SITE_URL=https://preview.loreweaver.no
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-pr-preview:
    if: github.event.action != 'closed'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-scw
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}

      - uses: ./.github/actions/fetch-scw-secret
        id: kubeconfig
        with:
          secret-name: k3s-kubeconfig

      - name: Deploy PR preview
        env:
          KUBECONFIG_CONTENT: ${{ steps.kubeconfig.outputs.value }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          echo "$KUBECONFIG_CONTENT" > /tmp/kubeconfig.yaml
          export KUBECONFIG=/tmp/kubeconfig.yaml
          NS="preview-pr-${PR_NUMBER}"

          # Create namespace
          kubectl create namespace "$NS" --dry-run=client -o yaml | kubectl apply -f -

          # Copy imagePullSecret into PR namespace
          # Auth: username is always "nologin", password is SCW_SECRET_KEY
          kubectl create secret docker-registry scaleway-registry \
            --namespace "$NS" \
            --docker-server="${{ env.REGISTRY }}" \
            --docker-username="nologin" \
            --docker-password="${{ secrets.SCW_SECRET_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Apply deployment, service, ingress
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: site
            namespace: $NS
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: site
            template:
              metadata:
                labels:
                  app: site
              spec:
                imagePullSecrets:
                  - name: scaleway-registry
                containers:
                  - name: site
                    image: ${IMAGE}
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 80
                    resources:
                      requests:
                        cpu: 10m
                        memory: 32Mi
                      limits:
                        memory: 64Mi
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: site
            namespace: $NS
          spec:
            selector:
              app: site
            ports:
              - port: 80
                targetPort: 80
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: site
            namespace: $NS
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
          spec:
            tls:
              - hosts:
                  - pr-${PR_NUMBER}.preview.loreweaver.no
                secretName: preview-wildcard-tls
            rules:
              - host: pr-${PR_NUMBER}.preview.loreweaver.no
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: site
                          port:
                            number: 80
          EOF

          kubectl rollout status deployment/site \
            --namespace "$NS" \
            --timeout=120s

          rm /tmp/kubeconfig.yaml

      - name: Comment PR URL
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const url = `https://pr-${prNumber}.preview.loreweaver.no`;
            const body = `Preview deployed: ${url}`;

            // Update or create comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.startsWith('Preview deployed:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-pr-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-scw
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}

      - uses: ./.github/actions/fetch-scw-secret
        id: kubeconfig
        with:
          secret-name: k3s-kubeconfig

      - name: Delete PR namespace
        run: |
          echo "${{ steps.kubeconfig.outputs.value }}" > /tmp/kubeconfig.yaml
          kubectl delete namespace "preview-pr-${{ github.event.pull_request.number }}" \
            --kubeconfig /tmp/kubeconfig.yaml \
            --ignore-not-found
          rm /tmp/kubeconfig.yaml

      - name: Clean up PR images from registry
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PREFIX="pr-${PR_NUMBER}-"

          # Get the image ID for the site image
          IMAGE_ID="$(scw registry image list name=site -o json | jq -r '.[0].id')"
          if [ -z "$IMAGE_ID" ] || [ "$IMAGE_ID" = "null" ]; then
            echo "No site image found in registry, skipping cleanup"
            exit 0
          fi

          # List all tags, filter locally for pr-N- prefix, delete each
          scw registry tag list image-id="$IMAGE_ID" -o json \
          | jq -r --arg prefix "$PREFIX" '.[] | select(.name | startswith($prefix)) | .id' \
          | while read -r TAG_ID; do
              echo "Deleting tag $TAG_ID"
              scw registry tag delete "$TAG_ID"
            done
