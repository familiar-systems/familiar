name: Infrastructure

on:
  pull_request:
    branches: [main]
    paths: [infra/tofu/**]
  push:
    branches: [main]
    paths: [infra/tofu/**]
  # Manual trigger: used by infra/tofu/scripts/rotate_scw_key.py to verify
  # a freshly-rotated SCW_* secret pair against the state backend.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MISE_PYTHON_UV_VENV_AUTO: "false"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/tofu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "opentofu"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: tofu fmt
        run: tofu fmt -check -recursive

      - name: tofu init (validation only)
        run: tofu init -backend=false

      - name: tofu validate
        run: tofu validate

  preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: infra/tofu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "opentofu"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - uses: ./.github/actions/setup-scw
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}

      - uses: ./.github/actions/fetch-scw-secret
        id: passphrase
        with:
          secret-name: tofu-config-passphrase

      - name: tofu init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          TF_VAR_state_encryption_passphrase: ${{ steps.passphrase.outputs.value }}
        run: tofu init

      - name: tofu plan
        id: plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          TF_VAR_state_encryption_passphrase: ${{ steps.passphrase.outputs.value }}
        run: |
          tofu plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
          {
            echo "plan<<PLANEOF"
            head -c 60000 plan-output.txt
            echo "PLANEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment plan on PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          PLAN: ${{ steps.plan.outputs.plan }}
        with:
          script: |
            const plan = process.env.PLAN;
            const body = `### OpenTofu Plan\n\n\`\`\`\n${plan.substring(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: infra/tofu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "opentofu"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - uses: ./.github/actions/setup-scw
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}

      - uses: ./.github/actions/fetch-scw-secret
        id: passphrase
        with:
          secret-name: tofu-config-passphrase

      - name: tofu init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          TF_VAR_state_encryption_passphrase: ${{ steps.passphrase.outputs.value }}
        run: tofu init

      - name: tofu apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          TF_VAR_state_encryption_passphrase: ${{ steps.passphrase.outputs.value }}
        run: |
          tofu plan -out=tfplan
          tofu apply tfplan
