name: Kubernetes

on:
  pull_request:
    branches: [main]
    paths:
      - infra/k8s/base/**
      - infra/k8s/overlays/prod/**
      - infra/k8s/helm/**
      - infra/k8s/scripts/**
  push:
    branches: [main]
    paths:
      - infra/k8s/base/**
      - infra/k8s/overlays/prod/**
      - infra/k8s/helm/**
      - infra/k8s/scripts/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "kubectl kubeconform"
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: Validate prod overlay
        run: mise run lint:k8s

  apply:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: kubectl
          cache_key: "mise-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - uses: ./.github/actions/setup-scw
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}

      - uses: ./.github/actions/fetch-scw-secret
        id: kubeconfig
        with:
          secret-name: k3s-kubeconfig

      - name: Sync secrets and apply manifests
        env:
          KUBECONFIG_CONTENT: ${{ steps.kubeconfig.outputs.value }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: |
          echo "$KUBECONFIG_CONTENT" > /tmp/kubeconfig.yaml
          export KUBECONFIG=/tmp/kubeconfig.yaml

          infra/k8s/scripts/sync-prod-secrets.sh

          kubectl kustomize infra/k8s/overlays/prod | kubectl apply --server-side --force-conflicts --dry-run=server -f -
          kubectl kustomize infra/k8s/overlays/prod | kubectl apply --server-side --force-conflicts -f -

          for deploy in site web platform campaign; do
            if kubectl get "deployment/${deploy}" --namespace default >/dev/null 2>&1; then
              kubectl rollout status "deployment/${deploy}" --namespace default --timeout=120s
            fi
          done

          rm /tmp/kubeconfig.yaml
