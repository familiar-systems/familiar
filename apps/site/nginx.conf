server {
  listen 80 default_server;
  root /usr/share/nginx/html;
  index index.html;

  # Astro emits directories per page (dist/en/blog/foo/index.html), so a request
  # for /en/blog/foo (no trailing slash) hits `try_files $uri/` and nginx auto-
  # 301s to add the slash. The default redirect is *absolute* and uses the
  # listening socket's scheme - here `listen 80`, so http - producing a Location
  # like http://familiar.systems/en/blog/foo/ even when the original request was
  # https through Traefik. The plain-http edge has no router for that path, so
  # browsers follow into a 404. Relative redirects let the browser preserve the
  # request's scheme, host, and path prefix (preview /pr-N).
  absolute_redirect off;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/wasm application/xml application/rss+xml image/svg+xml;
  gzip_min_length 1024;

  # Astro emits hashed asset filenames under /_astro/. Safe to cache for a year.
  location /_astro/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri =404;
  }

  # HTML pages reference hashed /_astro/ URLs; if HTML is cached, users get
  # stale references after a deploy. Security headers live at every location
  # that sets any add_header because nginx resets add_header inheritance
  # whenever a child block declares one.
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri $uri.html $uri/ =404;
  }

  error_page 404 /404.html;
  location = /404.html {
    internal;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  }
}
