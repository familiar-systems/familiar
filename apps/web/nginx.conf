server {
  listen 80 default_server;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;
  gzip_min_length 1024;

  # Vite emits hashed filenames under /assets/. Safe to cache for a year.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # index.html references hashed asset URLs; if it's ever cached, users get
  # stale references after a deploy. Security headers live at this location
  # (and every location that sets any add_header) because nginx resets
  # add_header inheritance whenever a child block declares one.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  # SPA fallback: client-side routes fall through to index.html, which
  # re-enters the matcher above so its cache-control + CSP apply.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
