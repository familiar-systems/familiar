# yaml-language-server: $schema=./.schemas/systems-schema.json
systems:
  - id: dnd-5e
    name:
      en: D&D 5e (2014)
    tagline:
      en: "Heroic high fantasy. Spell slots, long rests, the three pillars."
    color: "#FF0000"
    popular: true
    bundle:
      - common/player
      - common/npc
  - id: daggerheart
    name:
      en: Daggerheart
    tagline:
      en: "Heroes in a collaborative worldbuilding fantasy. Cards, characters, hope, and fear."
    color: "#52A4BC"
    popular: true
    bundle:
      - common/player
      - common/npc
  - id: blades-in-the-dark
    name:
      en: Blades in the Dark
    tagline:
      en: "The Crew does jobs in a haunted, electrified city."
    color: "#212227"
    popular: false
    bundle:
      - common/player
      - common/npc
      - blades-in-the-dark/crew

# Always-available "bring your own" affordance. Maintainer configuration
# is the default template bundle; the BYO card's UI copy (title, body,
# empty-input fallback, swatch color) lives in the wizard frontend
# alongside the rest of its hardcoded strings, so it isn't repeated here.
byo:
  bundle:
    - common/player
    - common/npc
