# yaml-language-server: $schema=../../.schemas/starter-content-schema.json
meta:
  name:
    en: NPC
  description:
    en: That one person you met. Or centaur. Or whatever.
  icon: person-standing

body:
  - node: paragraph
    text:
      en: "An NPC (non-player character) is any character in the fiction not controlled by a player: everyone the party meets, fights, hires, lies to, or ignores. The GM voices and decides for them, and they span a huge range of fictional weight: the innkeeper with three lines of dialogue, the noble who hires the party, the recurring rival, the dragon in the final room. NPCs are the GM's primary lever for plot, faction pressure, and tone; the world is mostly made of them. Good practice across systems is to give every meaningful NPC a want, a quirk, and a relationship to something the party cares about, because the mechanical sheet is usually the least interesting thing about them; what makes an NPC matter is their pull on the story and the party's attachments."
  - node: paragraph
    text:
      en: "Common categorical splits: by role (ally, neutral, antagonist), by fictional weight (named/recurring vs. background), and by mechanical weight (full statblock vs. ad-hoc improv). Most NPCs never need stats; the GM resolves their actions narratively or with a single roll. Stats appear when conflict is on the table. Good practice across systems is to give every meaningful NPC a want, a quirk, and a relationship to something the party cares about, since the mechanical sheet is usually the least interesting thing about them. NPCs are the GM's primary lever for plot, faction pressure, and tone. The world is mostly made of them."
