# yaml-language-server: $schema=../../.schemas/starter-content-schema.json
meta:
  name:
    en: Player Character
  description:
    en: Your protagonist.
  icon: speech

body:
  - node: paragraph
    text:
      en: "A player character (PC) is the protagonist a single player owns and controls - the lens through which one person engages with the fiction. Unlike NPCs, PCs are deeply customized, persist across sessions, and accumulate history: relationships, scars, debts, reputations, gear. The party is the set of PCs, and most systems are built around the assumption that the PCs are the story's main characters: the people whose choices drive the plot and whose fates the table cares about. A player speaks for their PC, decides their actions, and has final authority over their interiority (what they think, feel, believe), while the GM adjudicates how the world responds."
  - node: paragraph
    text:
      en: "Mechanically, PCs almost always get the system's heaviest character sheet: attributes or stats, skills or moves, some kind of health or stress track, gear, and a progression mechanic (levels, XP, advances, milestones) that lets the character change over time. Most systems give PCs unique structural affordances NPCs don't have such as luck points, hero dice, bonds, flags, or other player-facing levers that let them bend outcomes or signal what they want the story to be about. Character creation is usually a substantial step (choosing a class, archetype, playbook, or lifepath), and the resulting sheet is asymmetric with NPC mechanics on purpose: PCs are meant to feel mechanically distinct, durable, and central in a way the rest of the cast is not."
