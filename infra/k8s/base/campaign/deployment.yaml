# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.31.0/deployment-apps-v1.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: campaign
spec:
  replicas: 1
  selector:
    matchLabels:
      app: campaign
  template:
    metadata:
      labels:
        app: campaign
    spec:
      imagePullSecrets:
        - name: scaleway-registry
      initContainers:
        - name: chown-data
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 65532:65532 /data/campaigns"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: campaign-data
              mountPath: /data/campaigns
      containers:
        - name: campaign
          image: rg.fr-par.scw.cloud/loreweaver/campaign:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: CAMPAIGN_DATA_DIR
              value: /data/campaigns
            - name: PLATFORM_URL
              value: http://platform:3000
            - name: CAMPAIGN_IDLE_TIMEOUT_SECS
              value: "1800"
            - name: CAMPAIGN_EVICTION_CHECK_INTERVAL_SECS
              value: "180"
            - name: RUST_LOG
              value: info
          envFrom:
            - secretRef:
                name: internal-bearer
          volumeMounts:
            - name: campaign-data
              mountPath: /data/campaigns
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: campaign-data
          persistentVolumeClaim:
            claimName: campaign-pvc
