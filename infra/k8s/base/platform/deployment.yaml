# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.31.0/deployment-apps-v1.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform
  template:
    metadata:
      labels:
        app: platform
    spec:
      imagePullSecrets:
        - name: scaleway-registry
      initContainers:
        - name: chown-data
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 65532:65532 /data/platform"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: platform-data
              mountPath: /data/platform
      containers:
        - name: platform
          image: rg.fr-par.scw.cloud/loreweaver/platform:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              value: sqlite:///data/platform/platform.db?mode=rwc
            - name: CAMPAIGN_SHARD_URL
              value: http://campaign:3000
            - name: RUST_LOG
              value: info
          envFrom:
            - secretRef:
                name: internal-bearer
          volumeMounts:
            - name: platform-data
              mountPath: /data/platform
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: platform-data
          persistentVolumeClaim:
            claimName: platform-pvc
