apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ${NAMESPACE}

resources:
  - ../../base
  - namespace.yaml
  # External Secrets (ESO syncs from Scaleway SM)
  - secrets/internal-bearer.yaml
  - secrets/hetzner-s3.yaml
  # Persistent storage (per-PR hostPaths)
  - storage/platform-pv.yaml
  - storage/platform-pvc.yaml
  - storage/campaign-pv.yaml
  - storage/campaign-pvc.yaml
  # Ingress rules (preview domains, per-PR path prefixes)
  - ingresses/site.yaml
  - ingresses/web.yaml
  - ingresses/platform.yaml
  - ingresses/campaign.yaml

patches:
  - path: patches/deployments.yaml
