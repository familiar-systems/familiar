apiVersion: v1
kind: PersistentVolume
metadata:
  name: platform-pv
  labels:
    app: platform
spec:
  capacity:
    storage: 1Gi
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: default
    name: platform-pvc
  hostPath:
    path: /data/platform
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.familiar.systems/role
              operator: In
              values: [platform]
