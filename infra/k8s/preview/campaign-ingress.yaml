# Per-PR preview campaign tier served at:
#   app.preview.familiar.systems/pr-${PR_NUMBER}/catalog/...   (catalog endpoint)
#   app.preview.familiar.systems/pr-${PR_NUMBER}/campaign/...  (per-campaign API + WS)
# StripPrefix removes only the PR prefix; the campaign binary registers
# its routes at full paths (/catalog/systems, /campaign/<id>/initialize).
# Distinct from platform-ingress.yaml, which collapses /pr-N/api into a
# single atomic strip because platform serves one service-prefix; campaign
# serves two top-level prefixes and registers them in the binary.
#
# /internal/* is intentionally absent from this Ingress. It is the second
# of three defense layers (see docs/plans/2026-05-11-new-campaign-onboarding.md
# §"Internal-API defense layers"); the first is the public-Ingress
# discipline encoded here (no /internal/* path), and the third is the
# bearer middleware in the binary.
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: campaign-strip-prefix
  namespace: ${NAMESPACE}
spec:
  stripPrefix:
    prefixes:
      - /pr-${PR_NUMBER}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: campaign
  namespace: ${NAMESPACE}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: ${NAMESPACE}-campaign-strip-prefix@kubernetescrd
spec:
  tls:
    - hosts:
        - app.preview.familiar.systems
      secretName: preview-wildcard-tls
  rules:
    - host: app.preview.familiar.systems
      http:
        paths:
          - path: /pr-${PR_NUMBER}/catalog
            pathType: Prefix
            backend:
              service:
                name: campaign
                port:
                  number: 3000
          - path: /pr-${PR_NUMBER}/campaign
            pathType: Prefix
            backend:
              service:
                name: campaign
                port:
                  number: 3000
