# Shared bearer for platform <-> campaign /internal/* calls. The value
# is sourced from Scaleway SM `internal-bearer-preview` by the preview
# workflow (.github/workflows/ci_cd_preview.yml) and substituted into
# ${INTERNAL_BEARER_PRIMARY_B64} below before kubectl apply.
#
# `stringData` would be more readable but envsubst-then-kubectl-apply
# can't safely round-trip raw bearer bytes through YAML; pre-base64-ing
# in the workflow and using `data:` avoids any YAML-escaping foot-guns.
#
# ${INTERNAL_BEARER_SECONDARY_B64} is empty in steady state and set only
# during a rotation window. The YAML omits the key when empty rather than
# emitting `INTERNAL_BEARER_SECONDARY: ""`, which the bearer middleware
# would treat as a valid (empty-string) accepted bearer. See
# infra/pulumi-cloud/CLAUDE.md "Rotation: internal-bearer-prod" for the
# same contract on the prod side.
apiVersion: v1
kind: Secret
metadata:
  name: internal-bearer
  namespace: ${NAMESPACE}
type: Opaque
data:
  INTERNAL_BEARER_PRIMARY: ${INTERNAL_BEARER_PRIMARY_B64}
