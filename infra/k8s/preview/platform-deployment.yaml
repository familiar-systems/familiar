apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform
  template:
    metadata:
      labels:
        app: platform
    spec:
      imagePullSecrets:
        - name: scaleway-registry
      containers:
        - name: platform
          image: ${PLATFORM_IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: HANKO_API_URL
              value: ${HANKO_API_URL_DEV}
            - name: CORS_ORIGINS
              # All preview SPAs share a single apex origin regardless of
              # PR number. Browser calls from /pr-N/app to /pr-N/api are
              # same-origin (preview.familiar.systems) and don't trigger
              # CORS preflight; this entry exists for non-browser callers.
              value: https://preview.familiar.systems
            - name: DATABASE_URL
              value: sqlite:///data/platform/platform.db?mode=rwc
            - name: PORT
              value: "3000"
            - name: RUST_LOG
              value: info
          volumeMounts:
            - name: platform-data
              mountPath: /data/platform
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: platform-data
          persistentVolumeClaim:
            claimName: platform-pvc
