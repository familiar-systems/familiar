# Layer 2 of the /internal/* defense (see
# docs/plans/2026-05-11-new-campaign-onboarding.md §"Internal-API defense
# layers"). Without a NetworkPolicy, any pod in any namespace can dial
# platform's Service on :3000/internal/init directly. This policy
# restricts ingress to:
#   - Traefik (kube-system, app.kubernetes.io/name=traefik) for /api/*
#   - Same-namespace pods labeled app=campaign for /internal/*
# Default deny on everything else.
#
# k3s ships the built-in NetworkPolicy controller (kube-router-based)
# alongside Flannel; no CNI swap required.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: platform
  namespace: ${NAMESPACE}
spec:
  podSelector:
    matchLabels:
      app: platform
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - port: 3000
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app: campaign
      ports:
        - port: 3000
          protocol: TCP
