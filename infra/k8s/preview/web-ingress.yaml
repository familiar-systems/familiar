# Per-PR preview SPA served at preview.familiar.systems/pr-${PR_NUMBER}/app.
# The Vite bundle is built with VITE_BASE_PATH=/pr-${PR_NUMBER}/app/ so all
# asset URLs resolve under this prefix. StripPrefix removes the PR+app
# prefix before the request reaches the nginx backend, which serves the
# built SPA from its root directory.
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: web-strip-prefix
  namespace: ${NAMESPACE}
spec:
  stripPrefix:
    prefixes:
      - /pr-${PR_NUMBER}/app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: ${NAMESPACE}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: ${NAMESPACE}-web-strip-prefix@kubernetescrd
spec:
  tls:
    - hosts:
        - preview.familiar.systems
      secretName: preview-wildcard-tls
  rules:
    - host: preview.familiar.systems
      http:
        paths:
          - path: /pr-${PR_NUMBER}/app
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
