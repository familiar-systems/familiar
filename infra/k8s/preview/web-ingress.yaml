apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: ${NAMESPACE}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts:
        - ${WEB_HOST}
      secretName: preview-wildcard-tls
  rules:
    - host: ${WEB_HOST}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
