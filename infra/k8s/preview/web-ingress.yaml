# Per-PR preview SPA served at app.preview.familiar.systems/pr-${PR_NUMBER}/.
# The SPA lives at the root of the app apex, so the Vite bundle is built with
# VITE_BASE_PATH=/pr-${PR_NUMBER}/ — no /app/ prefix. StripPrefix removes the
# PR path before the request reaches the nginx backend, which serves the built
# SPA from its root directory. Within this host, the /api and /campaign
# ingresses below use longer prefixes and win by Traefik's rule-length
# priority; this rule catches the remaining paths for the SPA.
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: web-strip-prefix
  namespace: ${NAMESPACE}
spec:
  stripPrefix:
    prefixes:
      - /pr-${PR_NUMBER}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: ${NAMESPACE}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: ${NAMESPACE}-web-strip-prefix@kubernetescrd
spec:
  tls:
    - hosts:
        - app.preview.familiar.systems
      secretName: preview-wildcard-tls
  rules:
    - host: app.preview.familiar.systems
      http:
        paths:
          - path: /pr-${PR_NUMBER}
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
