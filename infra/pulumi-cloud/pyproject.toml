[project]
name = "loreweaver-cloud"
version = "0.1.0"
description = "Loreweaver cloud infrastructure"
requires-python = ">=3.12"
dependencies = [
    "pulumi>=3",
    "pulumi-hcloud>=1",
]

[dependency-groups]
dev = [
    "ruff>=0.11",
    "ty>=0.0.1a7",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D",       # pydocstyle — no forced docstrings
    "ANN101",  # missing type annotation for self
    "ANN102",  # missing type annotation for cls
    "COM812",  # trailing comma (conflicts with formatter)
    "ISC001",  # implicit string concat (conflicts with formatter)
]

[tool.ty]
python-version = "3.12"
