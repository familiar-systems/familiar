[project]
name = "loreweaver-cloud"
version = "0.1.0"
description = "Loreweaver cloud infrastructure"
requires-python = ">=3.12"
dependencies = ["pulumi>=3", "pulumi-hcloud>=1", "pulumiverse-scaleway>=1"]

[dependency-groups]
dev = ["ruff>=0.11", "basedpyright>=1"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "D", # pydocstyle — no forced docstrings
  "COM812", # trailing comma (conflicts with formatter)
  "ISC001", # implicit string concat (conflicts with formatter)
]
