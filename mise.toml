[tools]
"github:bnjbvr/cargo-machete" = "latest"
node = "24"
"npm:pnpm" = "11.1"
# Owns both channel and components. Mise delegates to rustup: it exports
# RUSTUP_TOOLCHAIN at activation and runs `rustup component add` for anything
# missing from this CSV. The toolchain lives under ~/.rustup, not under
# ~/.local/share/mise. Do NOT add a rust-toolchain.toml — RUSTUP_TOOLCHAIN
# beats it in rustup's precedence chain, so the file would be a no-op.
rust = { version = "latest", profile = 'default', components = "rust-analyzer,rust-src" }
python = "3.14"
uv = "latest"
actionlint = "latest"
kubeconform = "latest"
caddy = "latest"
zizmor = "latest"
pinact = "latest"
trufflehog = "latest"
gitleaks = "latest"

[settings]
python.uv_venv_auto = "create|source"
lockfile = true

# --- env ---
# Public, non-secret config available to all tasks. Canonical home for
# HANKO_API_URL_DEV (see docs/plans/2026-04-11-app-server-prd.md
# "Authentication and signup": auth-mode-agnostic platform). The dev URL
# also appears in .github/workflows/deploy-preview.yml as a documented
# derived copy because GHA cannot read TOML natively.
[env]
HANKO_API_URL_DEV = "https://auth.preview.familiar.systems"
# Shared bearer for the platform <-> campaign /internal/* API. Local-only
# value: never appears in any deployed environment. Both prod and preview
# pull their bearer from Scaleway SM (`internal-bearer-prod`,
# `internal-bearer-preview`); see infra/pulumi-cloud/CLAUDE.md "Required
# Scaleway SM Secrets". Pulling from SM at every `mise run dev` would add
# a Scaleway credential dependency for every dev start, which we explicitly
# don't want — hence the fixed string here.
INTERNAL_BEARER_PRIMARY = "dev-internal-bearer-not-a-secret"
# Marketing-site link target for Sign In. The site is built statically, so the
# value is baked in at build time. Local dev uses the Caddy app-apex front
# door; preview/prod set PUBLIC_APP_URL in their CI build steps.
APP_URL_DEV = "http://app.localhost:8080"
# Astro `site` (canonical URL for sitemap/RSS/absolute links) and `base`
# (URL prefix). astro.config.mjs throws if either is unset; preview + prod
# pass them as Docker build-args, local dev gets them from this block.
# Set at top-level (not per-task) because astro check, astro build, and
# astro dev all load the config and so all need them.
SITE_URL = "http://localhost:8080"
SITE_BASE_PATH = "/"

# --- setup ---

[tasks.setup]
description = "Install all dev dependencies (pnpm + uv venvs). Run after cloning or in a new worktree."
depends = ["setup:*"]

[tasks."setup:ts"]
description = "Install TS workspace dependencies"
run = "pnpm install"

[tasks."setup:python-workers"]
description = "Sync Python venv for ML workers"
dir = "workers/whisperx"
run = "uv sync"

[tasks."setup:python-infra"]
description = "Sync Python venv for Pulumi infra"
dir = "infra/pulumi-cloud"
run = "uv sync"

[tasks."setup:e2e"]
description = "Install Playwright's browser binary (chromium) for apps/web e2e tests"
# Playwright pins exact browser revisions per @playwright/test version, so
# we let Playwright manage the install itself instead of mise tracking the
# browser as a tool. Cached at ~/.cache/ms-playwright; idempotent.
run = "pnpm --filter @familiar-systems/web exec playwright install chromium"

# --- check ---

[tasks.check]
description = "Run all checks in parallel (format:check, lint, typecheck, test, e2e)"
depends = ["format:check", "lint", "typecheck", "test", "e2e"]

# --- dev ---

[tasks.dev]
description = "Start all dev servers (site, SPA, platform, campaign, proxy). Open http://localhost:8080."
depends = ["dev:*"]

[tasks."dev:site"]
description = "Astro dev server (port 4321)"
run = "pnpm --filter @familiar-systems/site dev"
# Astro auto-exposes PUBLIC_*-prefixed env vars to client modules via
# import.meta.env. The site reads PUBLIC_APP_URL to build the Sign In link.
env = { PUBLIC_APP_URL = "{{ env.APP_URL_DEV }}" }

[tasks."dev:web"]
description = "Vite dev server (port 5173, SPA served at root of the app apex; reach it through Caddy at http://app.localhost:8080)"
run = "pnpm --filter @familiar-systems/web dev"
# Dev mirrors the prod two-apex layout: marketing at http://localhost:8080/ →
# Astro, app at http://app.localhost:8080/ → SPA, /api → platform, /campaign →
# campaign. Caddy (dev:proxy) binds both host matchers on :8080 so the
# browser sees two distinct origins - identical to what Traefik enforces in
# k3s. VITE_BASE_PATH is intentionally unset: vite.config.ts defaults to "/"
# for dev/prod; CI overrides it per-PR (/pr-${N}/) for preview builds.
# VITE_SITE_URL is the marketing-apex origin the SPA links out to (e.g. for
# the privacy-policy link on the login page). Same value as the marketing
# site's own SITE_URL; SPA/Vite needs the VITE_-prefixed copy to expose it
# via import.meta.env.
env = { VITE_HANKO_API_URL = "{{ env.HANKO_API_URL_DEV }}", VITE_SITE_URL = "{{ env.SITE_URL }}" }

[tasks."dev:platform"]
description = "Platform server (port 3000). dev-ui mounts Scalar at /api/docs."
# `mkdir -p data` is here, not in the binary, because DATABASE_URL is set per
# task and the data directory only matters in dev. Fresh worktrees don't
# inherit the directory; SQLite's `mode=rwc` creates the file but not the
# parent. Cheap enough to run every dev start.
run = ["mkdir -p data", "cargo run -p familiar-systems-platform --features dev-ui"]
# CORS origin is the app-apex front door, not the marketing apex. The SPA
# lives on app.localhost:8080 and any browser fetch from it to /api/* is
# same-origin, so no preflight fires; this entry is defense-in-depth for
# non-browser callers that send an Origin header against :3000 directly.
env = { HANKO_API_URL = "{{ env.HANKO_API_URL_DEV }}", DATABASE_URL = "sqlite://data/dev-platform.db?mode=rwc", PORT = "3000", CORS_ORIGINS = "http://app.localhost:8080", RUST_LOG = "info,familiar_systems_platform=debug" }

[tasks."dev:campaign"]
description = "Campaign server (port 3001)"
# Parallels dev:platform: per-task `data/` directory created here because
# CAMPAIGN_DATA_DIR is set per task and the parent must exist before the
# binary writes into it. Local-dev uses 3001 to avoid colliding with
# dev:platform's 3000; the container default (Dockerfile + cluster) is 3000.
run = ["mkdir -p data/dev-campaigns", "cargo run -p familiar-systems-campaign"]
env = { PORT = "3001", CAMPAIGN_DATA_DIR = "data/dev-campaigns", RUST_LOG = "info,familiar_systems_campaign=debug" }

[tasks."dev:proxy"]
description = "Caddy reverse proxy on :8080 unifying site + SPA + platform + campaign under one origin"
# Caddy retries upstreams with 502s until they come up, so ordering within
# the parallel `dev:*` graph doesn't matter - start this alongside the rest.
run = "caddy run --config Caddyfile.dev --adapter caddyfile"

# --- build ---

[tasks.build]
description = "Build all targets"
depends = ["build:*"]

[tasks."build:site"]
env = { PUBLIC_APP_URL = "{{ env.APP_URL_DEV }}" }
run = "pnpm --filter @familiar-systems/site build"

[tasks."build:web"]
# VITE_SITE_URL is the marketing-apex origin the SPA links out to (e.g. for
# the privacy-policy link on the login page). Local builds produce a
# smoke-test bundle pointed at the dev marketing apex; CI builds for
# preview/prod set this build-arg via the build-web composite action.
env = { VITE_SITE_URL = "{{ env.SITE_URL }}" }
run = "pnpm --filter @familiar-systems/web build"

[tasks."build:rust"]
run = "cargo build"

# --- test ---

[tasks.test]
description = "Run all tests"
depends = ["test:*"]

[tasks."test:ts"]
run = "pnpm test"
sources = [
  "apps/**/*.{ts,tsx,js,jsx}",
  "packages/**/*.{ts,tsx,js,jsx}",
  "apps/**/package.json",
  "packages/**/package.json",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "vitest.config.*",
  "apps/**/vitest.config.*",
  "packages/**/vitest.config.*",
]

[tasks."test:rust"]
description = "Run Rust tests (cargo test triggers ts-rs codegen as a side effect)"
# ts-rs's `#[ts(export)]` derive expands into a `#[cfg(test)]
# export_bindings_<TypeName>()` test that writes the .ts file when the
# suite runs - so `cargo test` is what produces the ts-rs side of
# packages/*/src/generated/. The OpenAPI half is owned by `generate-types`
# and runs on top of this task via `depends`.
run = """
cargo test --workspace
pnpm exec oxfmt packages/types-app/src/generated packages/types-campaign/src/generated
"""
sources = [
  "apps/platform/**/*.rs",
  "apps/campaign/**/*.rs",
  "crates/**/*.rs",
  "Cargo.toml",
  "Cargo.lock",
  "apps/platform/Cargo.toml",
  "apps/campaign/Cargo.toml",
  "crates/**/Cargo.toml",
]
outputs = [
  "packages/types-app/src/generated/**/*.ts",
  "packages/types-campaign/src/generated/**/*.ts",
]

[tasks."test:python"]
dir = "workers/whisperx"
run = "uv run pytest"
sources = [
  "workers/whisperx/**/*.py",
  "workers/whisperx/pyproject.toml",
  "workers/whisperx/uv.lock",
]

# --- e2e ---

[tasks.e2e]
description = "Browser E2E tests for apps/web (run `mise run setup:e2e` once before first use)"
# Deliberately not under `test:*`: Playwright spins up a Vite dev server
# and chromium per run, which would slow `mise run test` (the inner-loop
# command) and require browser binaries on every fresh worktree. `mise
# run check` includes this task, so PR-ready verification still covers
# the full browser flow; CI runs `check`, so e2e fires on every PR.
run = "pnpm --filter @familiar-systems/web e2e"
sources = [
  "apps/web/src/**/*.{ts,tsx}",
  "apps/web/e2e/**/*.ts",
  "apps/web/playwright.config.ts",
  "apps/web/package.json",
  "pnpm-lock.yaml",
]

# --- lint ---

[tasks.lint]
description = "Lint all ecosystems"
depends = ["lint:*"]

[tasks."lint:ts"]
run = "pnpm lint"
sources = [
  "apps/**/*.{ts,tsx,js,jsx,astro}",
  "packages/**/*.{ts,tsx,js,jsx}",
  "apps/**/package.json",
  "packages/**/package.json",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "tsconfig*.json",
  "apps/**/tsconfig*.json",
  "packages/**/tsconfig*.json",
  ".oxlintrc.json",
]

[tasks."lint:rust"]
description = "Clippy + cargo-machete (fails on warnings or unused Cargo dependencies)"
# Chained with && so machete doesn't bury clippy errors with dep-hygiene noise.
# cargo-machete reads every workspace Cargo.toml and greps every .rs file, so
# its trigger set is identical to clippy's - the same `sources` covers both.
run = "cargo clippy --workspace -- -D warnings && cargo machete"
sources = [
  "apps/platform/**/*.rs",
  "apps/campaign/**/*.rs",
  "crates/**/*.rs",
  "Cargo.toml",
  "Cargo.lock",
  "apps/platform/Cargo.toml",
  "apps/campaign/Cargo.toml",
  "crates/**/Cargo.toml",
]

[tasks."lint:python"]
dir = "workers/whisperx"
run = "uv run ruff check ."
sources = [
  "workers/whisperx/**/*.py",
  "workers/whisperx/pyproject.toml",
  "workers/whisperx/uv.lock",
]

[tasks."lint:infra"]
dir = "infra/pulumi-cloud"
run = "uv run ruff check ."
sources = [
  "infra/pulumi-cloud/**/*.py",
  "infra/pulumi-cloud/pyproject.toml",
  "infra/pulumi-cloud/uv.lock",
]

[tasks."lint:workflows"]
description = "Lint GitHub Actions workflow files with actionlint"
run = "actionlint"
sources = [
  ".github/workflows/**/*.yml",
  ".github/workflows/**/*.yaml",
  ".github/actions/**/*.yml",
  ".github/actions/**/*.yaml",
]

[tasks."lint:k8s"]
description = "Validate Kubernetes YAML manifests against schemas with kubeconform"
# Core K8s schemas come from the default location. CRD schemas (e.g. Traefik's
# Middleware) come from the datreeio/CRDs-catalog, the community-maintained
# JSON-schema mirror. The `{% raw %}` block keeps mise's tera templater away
# from kubeconform's own `{{.Group}}`-style placeholders in the URL.
run = """
{% raw %}kubeconform -strict -summary \
  -schema-location default \
  -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
  infra/k8s/{% endraw %}
"""

# --- format ---

[tasks.format]
description = "Format all code"
depends = ["format:ts", "format:rust", "format:python", "format:infra"]

[tasks."format:ts"]
run = "pnpm format"

[tasks."format:rust"]
run = "cargo fmt"

[tasks."format:python"]
dir = "workers/whisperx"
run = "uv run ruff format"

[tasks."format:infra"]
dir = "infra/pulumi-cloud"
run = "uv run ruff format"

[tasks."format:check"]
description = "Check formatting (all ecosystems)"
depends = ["format:check:*"]

[tasks."format:check:ts"]
run = "pnpm format:check"
sources = [
  "apps/**/*.{ts,tsx,js,jsx,astro,json,md,css,html}",
  "packages/**/*.{ts,tsx,js,jsx,json,md,css,html}",
  "package.json",
  "pnpm-lock.yaml",
  ".oxfmtrc.json",
]

[tasks."format:check:rust"]
run = "cargo fmt --check"
sources = [
  "apps/platform/**/*.rs",
  "apps/campaign/**/*.rs",
  "crates/**/*.rs",
  "rustfmt.toml",
  ".rustfmt.toml",
]

[tasks."format:check:python"]
dir = "workers/whisperx"
run = "uv run ruff format --check ."
sources = ["workers/whisperx/**/*.py", "workers/whisperx/pyproject.toml"]

[tasks."format:check:infra"]
dir = "infra/pulumi-cloud"
run = "uv run ruff format --check ."
sources = ["infra/pulumi-cloud/**/*.py", "infra/pulumi-cloud/pyproject.toml"]

# --- typecheck ---

[tasks.typecheck]
description = "Type-check all ecosystems"
depends = ["typecheck:*"]

[tasks."typecheck:ts"]
run = "pnpm typecheck"
sources = [
  "apps/**/*.{ts,tsx,js,jsx,astro}",
  "packages/**/*.{ts,tsx,js,jsx}",
  "apps/**/package.json",
  "packages/**/package.json",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "tsconfig*.json",
  "apps/**/tsconfig*.json",
  "packages/**/tsconfig*.json",
  "apps/web/tsr.config.json",
]

[tasks."typecheck:rust"]
run = "cargo check --workspace"
sources = [
  "apps/platform/**/*.rs",
  "apps/campaign/**/*.rs",
  "crates/**/*.rs",
  "Cargo.toml",
  "Cargo.lock",
  "apps/platform/Cargo.toml",
  "apps/campaign/Cargo.toml",
  "crates/**/Cargo.toml",
]

[tasks."typecheck:python"]
dir = "workers/whisperx"
run = "uv run basedpyright"
sources = [
  "workers/whisperx/**/*.py",
  "workers/whisperx/pyproject.toml",
  "workers/whisperx/uv.lock",
]

[tasks."typecheck:infra"]
dir = "infra/pulumi-cloud"
run = "uv run basedpyright"
sources = [
  "infra/pulumi-cloud/**/*.py",
  "infra/pulumi-cloud/pyproject.toml",
  "infra/pulumi-cloud/uv.lock",
  "infra/pulumi-cloud/pyrightconfig.json",
]

# --- generate ---

[tasks.generate-types]
description = "Regenerate all TS bindings from Rust: ts-rs (via test:rust) + OpenAPI spec + typed paths interface"
# `depends = ["test:rust"]` runs cargo test first, which emits ts-rs
# bindings as a side effect of its export_bindings_* tests. After that
# completes, this task layers the OpenAPI pipeline on top: emit the spec
# from utoipa, run openapi-codegen to produce a typed `paths` interface
# that imports its component schemas from the ts-rs output, then format.
depends = ["test:rust"]
run = """
mkdir -p packages/types-app/openapi
cargo run -p familiar-systems-platform --bin emit-openapi > packages/types-app/openapi/platform.json
pnpm --filter @familiar-systems/openapi-codegen run generate:platform
pnpm exec oxfmt packages/types-app/openapi packages/types-app/src/openapi
"""
sources = [
  "apps/platform/**/*.rs",
  "apps/campaign/**/*.rs",
  "crates/**/*.rs",
  "Cargo.toml",
  "Cargo.lock",
  "apps/platform/Cargo.toml",
  "apps/campaign/Cargo.toml",
  "crates/**/Cargo.toml",
  "tooling/openapi-codegen/generate.ts",
]
outputs = [
  "packages/types-app/openapi/platform.json",
  "packages/types-app/src/openapi/platform.ts",
]

# --- clean ---

[tasks.clean]
description = "Remove all build artifacts and caches"
run = """
rm -rf target
rm -rf node_modules/.cache
find . -name 'dist' -type d -not -path '*/node_modules/*' -exec rm -rf {} +
find . -name '*.tsbuildinfo' -delete
"""

# --- ops ---

# Wraps infra/pulumi-cloud/scripts/rotate_scw_key.py. `raw = true` lets
# click (in the script) own arg parsing. For usage, run:
#   mise run rotate-scw-key -- -h
# The `--` is required only because mise's own `run` claims -h/--help.
[tasks."rotate-scw-key"]
description = "Rotate a Scaleway IAM api-key end-to-end. Args: <application-name> <gha|local> [--dry-run] [--keep-old]"
dir = "infra/pulumi-cloud"
raw = true
run = "uv run python scripts/rotate_scw_key.py"
