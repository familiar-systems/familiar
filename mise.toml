[tools]
node = "24"
"npm:pnpm" = "10.32"
rust = "stable"
python = "3.14"
uv = "latest"
actionlint = "latest"
kubeconform = "latest"

[settings]
python.uv_venv_auto = "create|source"
lockfile = true

# --- env ---
# Public, non-secret config available to all tasks. Canonical home for
# HANKO_API_URL_DEV (see docs/plans/2026-04-11-app-server-prd.md
# "Authentication and signup": auth-mode-agnostic platform). The dev URL
# also appears in .github/workflows/deploy-preview.yml as a documented
# derived copy because GHA cannot read TOML natively.
[env]
HANKO_API_URL_DEV = "https://auth.preview.familiar.systems"

# --- check ---

[tasks.check]
description = "Run all checks in parallel (format:check, lint, typecheck, test)"
depends = ["format:check", "lint", "typecheck", "test"]

# --- dev ---

[tasks.dev]
description = "Start all dev servers"
depends = ["dev:*"]

[tasks."dev:site"]
description = "Astro dev server (port 4321)"
run = "pnpm --filter @familiar-systems/site dev"

[tasks."dev:web"]
description = "Vite dev server (port 5173)"
run = "pnpm --filter @familiar-systems/web dev"
env = { VITE_HANKO_API_URL = "{{ env.HANKO_API_URL_DEV }}" }

[tasks."dev:platform"]
description = "Platform server (port 3000)"
run = "cargo run -p familiar-systems-platform"
env = { HANKO_API_URL = "{{ env.HANKO_API_URL_DEV }}", DATABASE_URL = "sqlite://data/dev-platform.db?mode=rwc", PORT = "3000", CORS_ORIGINS = "http://localhost:5173", RUST_LOG = "info,familiar_systems_platform=debug" }

[tasks."dev:campaign"]
description = "Campaign server (port 3001)"
run = "cargo run -p familiar-systems-campaign"

# --- build ---

[tasks.build]
description = "Build all targets"
depends = ["build:*"]

[tasks."build:site"]
run = "pnpm --filter @familiar-systems/site build"

[tasks."build:web"]
run = "pnpm --filter @familiar-systems/web build"

[tasks."build:rust"]
run = "cargo build"

# --- test ---

[tasks.test]
description = "Run all tests"
depends = ["test:*"]

[tasks."test:ts"]
run = "pnpm test"
sources = [
  "apps/**/*.{ts,tsx,js,jsx}",
  "packages/**/*.{ts,tsx,js,jsx}",
  "apps/**/package.json",
  "packages/**/package.json",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "vitest.config.*",
  "apps/**/vitest.config.*",
  "packages/**/vitest.config.*",
]

[tasks."test:rust"]
description = "Run Rust tests and format ts-rs generated TS output"
run = """
cargo test --workspace
pnpm exec oxfmt packages/types-app/src/generated packages/types-campaign/src/generated
"""
sources = [
  "apps/platform/**/*.rs",
  "apps/campaign/**/*.rs",
  "crates/**/*.rs",
  "Cargo.toml",
  "Cargo.lock",
  "apps/platform/Cargo.toml",
  "apps/campaign/Cargo.toml",
  "crates/**/Cargo.toml",
]
outputs = [
  "packages/types-app/src/generated/**/*.ts",
  "packages/types-campaign/src/generated/**/*.ts",
]

[tasks."test:python"]
dir = "workers/whisperx"
run = "uv run pytest"
sources = [
  "workers/whisperx/**/*.py",
  "workers/whisperx/pyproject.toml",
  "workers/whisperx/uv.lock",
]

# --- lint ---

[tasks.lint]
description = "Lint all ecosystems"
depends = ["lint:*"]

[tasks."lint:ts"]
run = "pnpm lint"
sources = [
  "apps/**/*.{ts,tsx,js,jsx,astro}",
  "packages/**/*.{ts,tsx,js,jsx}",
  "apps/**/package.json",
  "packages/**/package.json",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "tsconfig*.json",
  "apps/**/tsconfig*.json",
  "packages/**/tsconfig*.json",
  ".oxlintrc.json",
]

[tasks."lint:rust"]
run = "cargo clippy --workspace -- -D warnings"
sources = [
  "apps/platform/**/*.rs",
  "apps/campaign/**/*.rs",
  "crates/**/*.rs",
  "Cargo.toml",
  "Cargo.lock",
  "apps/platform/Cargo.toml",
  "apps/campaign/Cargo.toml",
  "crates/**/Cargo.toml",
]

[tasks."lint:python"]
dir = "workers/whisperx"
run = "uv run ruff check ."
sources = [
  "workers/whisperx/**/*.py",
  "workers/whisperx/pyproject.toml",
  "workers/whisperx/uv.lock",
]

[tasks."lint:infra"]
dir = "infra/pulumi-cloud"
run = "uv run ruff check ."
sources = [
  "infra/pulumi-cloud/**/*.py",
  "infra/pulumi-cloud/pyproject.toml",
  "infra/pulumi-cloud/uv.lock",
]

[tasks."lint:workflows"]
description = "Lint GitHub Actions workflow files with actionlint"
run = "actionlint"
sources = [
  ".github/workflows/**/*.yml",
  ".github/workflows/**/*.yaml",
  ".github/actions/**/*.yml",
  ".github/actions/**/*.yaml",
]

[tasks."lint:k8s"]
description = "Validate Kubernetes YAML manifests against schemas with kubeconform"
run = "kubeconform -strict -summary -schema-location default infra/k8s/"

# --- format ---

[tasks.format]
description = "Format all code"
depends = ["format:ts", "format:rust", "format:python", "format:infra"]

[tasks."format:ts"]
run = "pnpm format"

[tasks."format:rust"]
run = "cargo fmt"

[tasks."format:python"]
dir = "workers/whisperx"
run = "uv run ruff format"

[tasks."format:infra"]
dir = "infra/pulumi-cloud"
run = "uv run ruff format"

[tasks."format:check"]
description = "Check formatting (all ecosystems)"
depends = ["format:check:*"]

[tasks."format:check:ts"]
run = "pnpm format:check"
sources = [
  "apps/**/*.{ts,tsx,js,jsx,astro,json,md,css,html}",
  "packages/**/*.{ts,tsx,js,jsx,json,md,css,html}",
  "package.json",
  "pnpm-lock.yaml",
  ".oxfmtrc.json",
]

[tasks."format:check:rust"]
run = "cargo fmt --check"
sources = [
  "apps/platform/**/*.rs",
  "apps/campaign/**/*.rs",
  "crates/**/*.rs",
  "rustfmt.toml",
  ".rustfmt.toml",
]

[tasks."format:check:python"]
dir = "workers/whisperx"
run = "uv run ruff format --check ."
sources = ["workers/whisperx/**/*.py", "workers/whisperx/pyproject.toml"]

[tasks."format:check:infra"]
dir = "infra/pulumi-cloud"
run = "uv run ruff format --check ."
sources = ["infra/pulumi-cloud/**/*.py", "infra/pulumi-cloud/pyproject.toml"]

# --- typecheck ---

[tasks.typecheck]
description = "Type-check all ecosystems"
depends = ["typecheck:*"]

[tasks."typecheck:ts"]
run = "pnpm typecheck"
sources = [
  "apps/**/*.{ts,tsx,js,jsx,astro}",
  "packages/**/*.{ts,tsx,js,jsx}",
  "apps/**/package.json",
  "packages/**/package.json",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "tsconfig*.json",
  "apps/**/tsconfig*.json",
  "packages/**/tsconfig*.json",
]

[tasks."typecheck:rust"]
run = "cargo check --workspace"
sources = [
  "apps/platform/**/*.rs",
  "apps/campaign/**/*.rs",
  "crates/**/*.rs",
  "Cargo.toml",
  "Cargo.lock",
  "apps/platform/Cargo.toml",
  "apps/campaign/Cargo.toml",
  "crates/**/Cargo.toml",
]

[tasks."typecheck:python"]
dir = "workers/whisperx"
run = "uv run basedpyright"
sources = [
  "workers/whisperx/**/*.py",
  "workers/whisperx/pyproject.toml",
  "workers/whisperx/uv.lock",
]

[tasks."typecheck:infra"]
dir = "infra/pulumi-cloud"
run = "uv run basedpyright"
sources = [
  "infra/pulumi-cloud/**/*.py",
  "infra/pulumi-cloud/pyproject.toml",
  "infra/pulumi-cloud/uv.lock",
  "infra/pulumi-cloud/pyrightconfig.json",
]

# --- generate ---

[tasks.generate-types]
description = "Clean, regenerate, and format TS types from Rust via ts-rs"
run = """
rm -rf packages/types-app/src/generated packages/types-campaign/src/generated
mise run test:rust
"""

# --- clean ---

[tasks.clean]
description = "Remove all build artifacts and caches"
run = """
rm -rf target
rm -rf node_modules/.cache
find . -name 'dist' -type d -not -path '*/node_modules/*' -exec rm -rf {} +
find . -name '*.tsbuildinfo' -delete
"""
